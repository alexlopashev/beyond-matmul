name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validation:
    name: Validate research artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bootstrap pinned tools
        run: |
          sh scripts/bootstrap --no-shell-activation
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.mise/bin" >> "$GITHUB_PATH"

      - name: Sync dependencies
        run: mise exec -- uv sync --locked

      - name: Check Torch frontend coverage matrix
        run: mise exec -- uv run python scripts/check_torch_frontend_coverage.py

      - name: Run unit tests
        run: mise exec -- uv run python -m unittest discover -s tests

      - name: Run fixed-weight inference demo
        run: mise exec -- uv run python examples/fixed_weight_inference_demo.py

      - name: Run Torch FX frontend demo
        run: mise exec -- uv run python examples/torch_fx_frontend_demo.py

      - name: Run adapter workload demo
        run: mise exec -- uv run python examples/adapter_workload_demo.py

      - name: Run Conv1d workload demo
        run: mise exec -- uv run python examples/conv1d_workload_demo.py

      - name: Run Torch coverage demo
        run: mise exec -- uv run python examples/torch_coverage_demo.py

      - name: Run workload case-study JSON artifact
        run: mise exec -- uv run python examples/case_study_artifacts.py --json-output docs/results/workload_case_studies.json

      - name: Run benchmark smoke test and JSON artifact
        run: mise exec -- uv run python benchmarks/fixed_weight.py --json-output docs/results/fixed_weight.json

      - name: Run approximation error ablation artifact
        run: mise exec -- uv run python benchmarks/approximation_error_ablation.py --json-output docs/results/approximation_error_ablation.json

      - name: Run planner contract ablation artifact
        run: mise exec -- uv run python benchmarks/planner_contract_ablation.py --json-output docs/results/planner_contract_ablation.json

      - name: Run PEFT Transformers LoRA smoke artifact
        run: mise exec -- uv run python benchmarks/peft_transformers_lora_inference.py --smoke --json-output docs/results/peft_transformers_lora_inference_smoke.json

      - name: Run PEFT multi-adapter serving smoke artifact
        run: mise exec -- uv run python benchmarks/peft_multi_adapter_serving.py --smoke --json-output docs/results/peft_multi_adapter_serving_smoke.json

      - name: Run hardware-backed PEFT contract smoke artifact
        run: mise exec -- uv run python benchmarks/peft_multi_adapter_serving.py --hardware-contract-smoke --json-output docs/results/hardware_backed_peft_multi_adapter_serving_smoke.json

      - name: Run OLMoE stock-baseline contract smoke artifact
        run: mise exec -- uv run python benchmarks/olmoe_stock_baseline.py --smoke --json-output docs/results/olmoe_stock_baseline_smoke.json

      - name: Upload fixed-weight benchmark JSON
        uses: actions/upload-artifact@v4
        with:
          name: fixed-weight-benchmark-json
          path: docs/results/fixed_weight.json

      - name: Upload workload case-study JSON
        uses: actions/upload-artifact@v4
        with:
          name: workload-case-studies-json
          path: docs/results/workload_case_studies.json

      - name: Upload approximation error ablation JSON
        uses: actions/upload-artifact@v4
        with:
          name: approximation-error-ablation-json
          path: docs/results/approximation_error_ablation.json

      - name: Upload planner contract ablation JSON
        uses: actions/upload-artifact@v4
        with:
          name: planner-contract-ablation-json
          path: docs/results/planner_contract_ablation.json

      - name: Upload PEFT Transformers LoRA smoke JSON
        uses: actions/upload-artifact@v4
        with:
          name: peft-transformers-lora-inference-smoke-json
          path: docs/results/peft_transformers_lora_inference_smoke.json

      - name: Upload PEFT multi-adapter serving smoke JSON
        uses: actions/upload-artifact@v4
        with:
          name: peft-multi-adapter-serving-smoke-json
          path: docs/results/peft_multi_adapter_serving_smoke.json

      - name: Upload hardware-backed PEFT contract smoke JSON
        uses: actions/upload-artifact@v4
        with:
          name: hardware-backed-peft-contract-smoke-json
          path: docs/results/hardware_backed_peft_multi_adapter_serving_smoke.json

      - name: Upload OLMoE stock-baseline contract smoke JSON
        uses: actions/upload-artifact@v4
        with:
          name: olmoe-stock-baseline-smoke-json
          path: docs/results/olmoe_stock_baseline_smoke.json
